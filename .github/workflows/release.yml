name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        run: go test ./...

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o sibsutis-schedule-${{ matrix.suffix }} .

      - name: Build bot
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o sibsutis-schedule-bot-${{ matrix.suffix }} ./cmd/bot

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibsutis-schedule-${{ matrix.suffix }}
          path: sibsutis-schedule-${{ matrix.suffix }}

      - name: Upload bot artifact
        uses: actions/upload-artifact@v4
        with:
          name: sibsutis-schedule-bot-${{ matrix.suffix }}
          path: sibsutis-schedule-bot-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'sibsutis-schedule-*' -o -name 'sibsutis-schedule-bot-*' \) \
            -exec cp {} release/ \;
          chmod +x release/sibsutis-schedule-*
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
