<!DOCTYPE html>
<html lang="ru" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6750a4">
  <title>{{.Title}}</title>
  <!-- Применяем тему ДО загрузки CSS, чтобы не было вспышки светлой/тёмной. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-apple.png">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/static/icon.svg" alt="" width="24" height="24" class="brand-icon">
      <strong>Расписание SibSUTI</strong>
    </a>
    <div class="theme-switch" role="group" aria-label="Тема оформления">
      <button type="button" data-theme-set="auto"  aria-pressed="false" title="Как в системе">Авто</button>
      <button type="button" data-theme-set="light" aria-pressed="false" title="Светлая">Светлая</button>
      <button type="button" data-theme-set="dark"  aria-pressed="false" title="Тёмная">Тёмная</button>
    </div>
  </header>
  <main class="container">
    {{template "content" .}}
  </main>
  <footer class="site-footer">
    <small>
      <a href="https://github.com/BLXCKBXXST/sibsutis-schedule">sibsutis-schedule</a>
      · открытый парсер my.sibsutis.ru
    </small>
  </footer>
  <script src="/static/app.js" defer></script>
</body>
</html>
